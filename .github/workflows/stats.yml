# Archivo para autohostear el servicio de estadísticas de uso de código 

name: Generate Stats
on:
  schedule:
    - cron: '0 0 * * *' # Corre cada día a las 00:00 UTC
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
 build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite hacer commit del SVG
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: languages.svg
          committer_name: "GitHub Action"
          committer_email: "action@github.com"
          commit_message: "Auto-generate languages stats"
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: "html,css"  # Opcional: ignora lenguajes de marcado
