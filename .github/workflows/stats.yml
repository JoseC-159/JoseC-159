# Archivo para autohostear el servicio de estadísticas de uso de código 

name: Generate Stats
on:
  schedule:
    - cron: '0 0 * * *' # Corre cada día a las 00:00 UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: languages.svg
          plugin_languages: yes
          plugin_languages_details: percentage
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add languages.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update stats"
          git push
